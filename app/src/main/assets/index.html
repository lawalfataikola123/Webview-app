<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My App</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; }
        .container { background:rgba(255,255,255,0.95); border-radius:20px; padding:40px 30px; width:100%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,0.3); text-align:center; }
        h1 { color:#333; font-size:2rem; margin-bottom:20px; font-weight:600; }
        p { color:#666; line-height:1.6; margin-bottom:30px; font-size:1.1rem; }
        .btn { background:#667eea; color:white; border:none; padding:15px 40px; border-radius:50px; font-size:1.2rem; font-weight:600; cursor:pointer; transition:background 0.3s ease; text-decoration:none; display:inline-block; margin-top:20px; }
        .btn:hover { background:#5a67d8; }
        .footer { margin-top:30px; color:#999; font-size:0.9rem; }
        .icon { font-size:4rem; margin-bottom:20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📱</div>
        <h1>Welcome to My App</h1>
        <p>This is a simple HTML page designed for your Android app. You can customize it as needed. Click the button below to visit our website.</p>
        <a href="https://example.com" class="btn" target="_blank">Open Website</a>
        <div class="footer">© 2026 My App. All rights reserved.</div>
    </div>
</body>
</html>
