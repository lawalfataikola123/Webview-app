<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebView App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 24px; }
        p { color: #666; margin-bottom: 20px; line-height: 1.6; }
        .button {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            margin: 5px;
        }
        .features {
            text-align: left;
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .features h3 { color: #333; margin-bottom: 10px; }
        .features ul { list-style: none; padding: 0; }
        .features li { padding: 8px 0; color: #555; border-bottom: 1px solid #eee; }
        .features li:last-child { border-bottom: none; }
        .features li::before { content: "✓ "; color: #667eea; font-weight: bold; }
        .footer { margin-top: 20px; color: #999; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📱</div>
        <h1>Welcome!</h1>
        <p>Your WebView App is working perfectly.</p>
        <div>
            <a href="https://google.com" class="button">Google</a>
            <a href="https://github.com" class="button">GitHub</a>
        </div>
        <div class="features">
            <h3>Features</h3>
            <ul>
                <li>Fast local HTML loading</li>
                <li>Responsive design</li>
                <li>Internet access enabled</li>
                <li>Modern UI styling</li>
            </ul>
        </div>
        <div class="footer">WebView App v1.0</div>
    </div>
</body>
</html>
